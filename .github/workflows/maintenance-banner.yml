name: Alfresco Maintenance Page
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to enable/disable Maintenance Banner"
        required: true
        type: choice
        options:
          - poc
          - dev
          - test
          - stage
          - preprod
          - prod
          - training
      enabled:
        description: 'Enable maintenance mode'
        required: true
        type: choice
        options:
          - true
          - false
      read-only-mode:
        description: 'Enable Read Only Mode for Alfresco (only applicable when maintenance mode is enabled. Enabling this will allow users to access Alfresco but they will not be able to make any changes. This is useful for allowing users to access Alfresco to retrieve information while service release is being done.)'
        required: false
        type: choice
        options:
          - true
          - false
        default: false

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  toggle-maintenance:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}-preapproved
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Kubernetes
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1
        with:
          version: 'v1.33.5'
        id: kubectl_install

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.15.2'
        id: helm_install

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}
          kubectl config set-context --current --namespace="${KUBE_NAMESPACE}"
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      - name: Toggle maintenance page in ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event.inputs.enabled }}" == "true" && "${{ github.event.inputs.read-only-mode }}" == "false" ]]; then
            echo "Enabling banner page for ${{ github.event.inputs.environment }} env.."
            kubectl patch ingress alfresco-content-services-alfresco-repository -n ${KUBE_NAMESPACE} \
            --type merge \
            -p '{
              "metadata":{
                "annotations":{
                  "nginx.ingress.kubernetes.io/configuration-snippet":"return 503; error_page 503 /maintenance.html;"
                }
              }
            }'
          elif [[ "${{ github.event.inputs.enabled }}" == "true" && "${{ github.event.inputs.read-only-mode }}" == "true" ]]; then
            echo "Enabling banner page with read only mode for ${{ github.event.inputs.environment }} env.."
            kubectl patch ingress alfresco-content-services-alfresco-repository -n ${KUBE_NAMESPACE} \
            --type merge \
            -p '{
              "metadata":{
                "annotations":{
                  "nginx.ingress.kubernetes.io/configuration-snippet":"if ($request_uri ~* \"^/metrics(/|$)(.*)\") { rewrite ^/metrics(/|$)(.*) /alfresco/s/prometheus break; } if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 503; } error_page 503 /maintenance.html;"
                }
              }
            }'
          else
            echo "Disabling maintenance page..."
            kubectl patch ingress alfresco-content-services-alfresco-repository \
            --namespace ${KUBE_NAMESPACE} \
            --type merge \
            -p '{
              "metadata":{
                "annotations":{
                  "nginx.ingress.kubernetes.io/configuration-snippet":"if ($request_uri ~* \"^/metrics(/|$)(.*)\") {\n  rewrite ^/metrics(/|$)(.*) /alfresco/s/prometheus break;\n}"
                }
              }
            }'
            echo "Maintenance page removed. Normal traffic restored."
          fi
