name: Alfresco Maintenance Page

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to enable/disable Maintenance Banner"
        required: true
        type: choice
        options:
          - poc
          - dev
          - test
          - stage
          - preprod
          - prod
          - training
      enabled:
        description: 'Enable or disable maintenance mode'
        required: true
        default: false
        type: boolean
      message:
        description: 'Maintenance banner message'
        required: true
        default: 'National Delius is down for planned maintenance. Read-only access will be available by 10:00.'

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  toggle-maintenance:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Kubernetes
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0
        with:
          version: 'v1.33.5'
        id: kubectl_install

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.15.2'
        id: helm_install

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}
          kubectl config set-context --current --namespace="${KUBE_NAMESPACE}"
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      - name: Toggle maintenance page in ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.enabled }}" == "true" ]; then
            echo "Enabling banner page for ${{ github.event.inputs.environment }} env.."
            kubectl patch ingress alfresco-content-services-alfresco-repository -n ${KUBE_NAMESPACE} \
            --type merge \
            -p '{
              "metadata":{
                "annotations":{
                  "nginx.ingress.kubernetes.io/configuration-snippet":"return 503; error_page 503 /maintenance.html;"
                }
              }
            }'
          else
            echo "Disabling maintenance page..."
            kubectl patch ingress alfresco-content-services-alfresco-repository \
            --namespace ${KUBE_NAMESPACE} \
            --type merge \
            -p '{
              "metadata":{
                "annotations":{
                  "nginx.ingress.kubernetes.io/configuration-snippet":"if ($request_uri ~* \"^/metrics(/|$)(.*)\") {\n  rewrite ^/metrics(/|$)(.*) /alfresco/s/prometheus break;\n}"
                }
              }
            }'
            echo "Maintenance page removed. Normal traffic restored."
          fi
