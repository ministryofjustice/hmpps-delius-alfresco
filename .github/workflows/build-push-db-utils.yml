name: Build and push image [DB Utils]

# This workflow is triggered in three ways:
#     - Manual trigger: Using the "Run workflow" button in GitHub Actions UI (workflow_dispatch)
#     - Push to main branch with changes to:
#       - Any files in tools/db-utils/** directory
#       - The workflow file itself (.github/workflows/build-push-db-utils.yml)
#     - Push to TM-* branches with the same path changes above; for these non-main branches the image is tagged with a branch-specific -<branch>-<run_id> suffix instead of :latest
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - TM-*
    paths:
      - tools/db-utils/**
      - .github/workflows/build-push-db-utils.yml

env:
  IMAGE_NAME: hmpps-delius-alfresco-db-utils
  REGISTRY: ghcr.io
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/db-utils/
          pull: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/db-utils/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sanitize branch name for Docker tag
        if: github.ref != 'refs/heads/main'
        id: sanitize
        run: echo "branch_tag=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/db-utils/
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.meta.outputs.tags }}, ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.sanitize.outputs.branch_tag }}-${{ github.run_id }}
          labels: ${{ steps.meta.outputs.labels }}
