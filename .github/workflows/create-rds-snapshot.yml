name: Alfresco create RDS snapshot

on:
  workflow_dispatch:
    inputs:
      which_env:
        description: Environment where RDS snapshot will be taken.
        required: true
        type: choice
        options:
          - poc
          - dev
          - test
          - stage
          - preprod
          - prod
          - training
      snapshot_name:
        description: "Name for snapshot (no special chars, spaces and use - and _ only)"
        required: false
        default: "hmpps-delius-alfresco"
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  create-rds-snapshot:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.which_env }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}

      - name: Generate snapshot name for ${{ inputs.which_env }} namespace
        id: snapshot_name
        run: |
          # Use input snapshot_name if provided, otherwise default
          SNAPSHOT_NAME_INPUT="${{ inputs.snapshot_name }}"
          
          # input validation
          if ! [[ "$SNAPSHOT_NAME_INPUT" =~ ^[a-zA-Z][a-zA-Z0-9-]*[a-zA-Z0-9]$ ]]; then
            echo "Error: Invalid snapshot name '$SNAPSHOT_NAME_INPUT'."
            echo "Snapshot names must start with a letter, only contain letters, numbers and hyphens and not end with a hyphen."
            exit 1
          fi
          
          # Check if user has set the snapshot name or using default
          if [ "$SNAPSHOT_NAME_INPUT" = "hmpps-delius-alfresco" ]; then
            # this is the default so append env and timestamp
            SNAPSHOT_NAME="${SNAPSHOT_NAME_INPUT}-${{ inputs.which_env }}-$(date +%Y%m%d%H%M%S)"
          else
            # use snapshot name as-is
            SNAPSHOT_NAME="$SNAPSHOT_NAME_INPUT"
          fi
          echo "snapshot_name=${SNAPSHOT_NAME}" >> $GITHUB_OUTPUT

      - name: Create RDS Snapshot
        run: |

          #!/bin/bash
          set -xe
          
          SERVICE_POD_DEPLOYMENT=$(kubectl get deployment -l app=service-pod -o jsonpath="{.items[0].metadata.name}")
          SERVICE_POD_NAME=$(kubectl get pod -l app=$SERVICE_POD_DEPLOYMENT -o jsonpath="{.items[0].metadata.name}")

          RDS_INSTANCE_IDENTIFIER=$(kubectl get secrets rds-instance-output -o jsonpath='{.data.RDS_INSTANCE_IDENTIFIER}' | base64 -d)
          
          SNAPSHOT_NAME="${{ steps.snapshot_name.outputs.snapshot_name }}"

          echo "Creating RDS snapshot for rds instance $RDS_INSTANCE_IDENTIFIER in ${{ inputs.which_env }} namespace."

          create_snapshot() {
            # Exec into the service pod and execute the script
            kubectl exec $SERVICE_POD_NAME -- /bin/sh -c \
            "aws rds create-db-snapshot \
            --db-instance-identifier '${RDS_INSTANCE_IDENTIFIER}' \
            --db-snapshot-identifier '${SNAPSHOT_NAME}'" \
            > /dev/null 2>&1
          }

          echo "RDS snapshot request submitted."
          create_snapshot

          # wait for the snapshot to be created
          kubectl exec $SERVICE_POD_NAME -- /bin/sh -c \
          "aws rds wait db-snapshot-completed \
          --db-snapshot-identifier '${SNAPSHOT_NAME}'" \
          > /dev/null 2>&1

          echo "RDS snapshot request completed. SNAPSHOT name- ${SNAPSHOT_NAME}."

      - name: Output Snapshot Name
        run: |
            echo "Snapshot Name: ${{ steps.snapshot_name.outputs.snapshot_name }}"
      
