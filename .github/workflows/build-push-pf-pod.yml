name: Build and push image [Port Forward Pod]

# This workflow is triggered in three ways:
#   - Manual trigger via the "Run workflow" button in the GitHub Actions UI (workflow_dispatch).
#   - Push to the main branch with changes to:
#       - Any files in the tools/port-forward/** directory.
#       - This workflow file (.github/workflows/build-push-pf-pod.yml).
#   - Push to a TM-* branch with the same path changes as above; in this case the image is tagged with a branch- and run-specific suffix instead of :latest.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - TM-*
    paths:
      - tools/port-forward/**
      - .github/workflows/build-push-pf-pod.yml

env:
  IMAGE_NAME: hmpps-delius-alfresco-port-forward-pod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/port-forward/
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.tags }}, ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/port-forward/
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.tags }}, ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.run_id }}
          labels: ${{ steps.meta.outputs.labels }}
