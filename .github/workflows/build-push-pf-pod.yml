name: Build and push image [Port Forward Pod]

# This workflow is triggered in two ways:
#     - Manual trigger: Using the "Run workflow" button in GitHub Actions UI (workflow_dispatch) - Note: bypasses path filtering
#     - Push to main, TM-*, or dependabot/** branches with changes to:
#       - Any files in tools/port-forward/** directory
#       - The workflow file itself (.github/workflows/build-push-pf-pod.yml)
# Tags: main branch gets :latest, non-main branches get :<sanitized-branch>-<run_id>
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - TM-*
      - 'dependabot/**'
    paths:
      - tools/port-forward/**
      - .github/workflows/build-push-pf-pod.yml

env:
  IMAGE_NAME: hmpps-delius-alfresco-port-forward-pod
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Log in to container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Sanitize branch name for Docker tag
        if: github.ref != 'refs/heads/main'
        id: sanitize
        run: |
          safe_branch=$(echo '${{ github.ref_name }}' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g' | sed -E 's/^[.-]+|[.-]+$//g')
          echo "branch_tag=${safe_branch}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./tools/port-forward/
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/{2}:latest', env.REGISTRY, github.repository_owner, env.IMAGE_NAME) || '' }}
            ${{ github.ref != 'refs/heads/main' && format('{0}/{1}/{2}:{3}-{4}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, steps.sanitize.outputs.branch_tag, github.run_id) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
